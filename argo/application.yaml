apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bjj-api
  namespace: argocd
spec:
  source:
    repoURL: YOUR_REPO_URL ####
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true